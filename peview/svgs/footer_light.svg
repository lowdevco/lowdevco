<svg xmlns="http://www.w3.org/2000/svg" width="900" height="92" viewBox="0 0 900 92">
<defs>
  <clipPath id="fc"><rect width="900" height="92" rx="8"/></clipPath>
  <!-- Gradient on title bar: solid left → fades to bg right (depth — mirrors header) -->
  <linearGradient id="fBarGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#f5f2eb"/>
    <stop offset="100%" stop-color="#fcfbf9"/>
  </linearGradient>
</defs>
<style>
  @keyframes pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
  .ofw-dot { animation: pulse 2.2s ease-in-out infinite; }
</style>
<g clip-path="url(#fc)">

  <!-- Base background -->
  <rect width="900" height="92" fill="#fcfbf9"/>

  <!-- ── TITLE BAR ──────────────────────────────────────────────────────── -->
  <rect width="900" height="34" fill="url(#fBarGrad)"/>
  <rect y="34" width="900" height="0.5" fill="#e5e1d8" opacity="0.6"/>

  <!-- Mac traffic-light dots (visual rhyme — mirrors header exactly) -->
  <circle cx="22" cy="17" r="4.5" fill="#ff5f57"/>
  <circle cx="38" cy="17" r="4.5" fill="#febc2e"/>
  <circle cx="54" cy="17" r="4.5" fill="#28c840"/>
  <text x="74" y="21"
        font-family="'Courier New', Consolas, monospace"
        font-size="11" font-weight="600"
        fill="#8c959f" letter-spacing="1">connect  ·  collaborate  ·  build</text>

  <!-- ── LINK PILLS ────────────────────────────────────────────────────── -->
  
    <a href="https://www.linkedin.com/in/muhammadirfank/" target="_blank">
      <!-- Pill shape (rx=13 — rhymes with badge rx=9 in header) -->
      <rect x="35" y="52" width="87.6" height="26" rx="13"
            fill="#f5f2eb" stroke="#e5e1d8" stroke-width="0.5"/>
      <!-- Accent dot prefix (visual rhyme: badge dot in header, bullet dots in profile) -->
      <circle cx="46" cy="65" r="2.5" fill="#7c3aed" opacity="0.65"/>
      <text x="89.8" y="69" text-anchor="middle"
            font-family="'Courier New', Consolas, monospace"
            font-size="10" font-weight="700"
            fill="#57606a" letter-spacing="0.5">LinkedIn</text>
    </a>
    <a href="https://github.com/lowdevco" target="_blank">
      <!-- Pill shape (rx=13 — rhymes with badge rx=9 in header) -->
      <rect x="132.6" y="52" width="73.2" height="26" rx="13"
            fill="#f5f2eb" stroke="#e5e1d8" stroke-width="0.5"/>
      <!-- Accent dot prefix (visual rhyme: badge dot in header, bullet dots in profile) -->
      <circle cx="143.6" cy="65" r="2.5" fill="#7c3aed" opacity="0.65"/>
      <text x="180.2" y="69" text-anchor="middle"
            font-family="'Courier New', Consolas, monospace"
            font-size="10" font-weight="700"
            fill="#57606a" letter-spacing="0.5">GitHub</text>
    </a>
    <a href="https://lowdevco.vercel.app/" target="_blank">
      <!-- Pill shape (rx=13 — rhymes with badge rx=9 in header) -->
      <rect x="215.8" y="52" width="94.8" height="26" rx="13"
            fill="#f5f2eb" stroke="#e5e1d8" stroke-width="0.5"/>
      <!-- Accent dot prefix (visual rhyme: badge dot in header, bullet dots in profile) -->
      <circle cx="226.8" cy="65" r="2.5" fill="#7c3aed" opacity="0.65"/>
      <text x="274.2" y="69" text-anchor="middle"
            font-family="'Courier New', Consolas, monospace"
            font-size="10" font-weight="700"
            fill="#57606a" letter-spacing="0.5">Portfolio</text>
    </a>

  <!-- ── OFW STATUS (pulsing dot — visual rhyme with badge dot in header) -->
  <circle cx="334.6" cy="65" r="4" fill="#16a34a" class="ofw-dot"/>
  <text x="347.6" y="69"
        font-family="'Courier New', Consolas, monospace"
        font-size="10.5" font-weight="700"
        fill="#16a34a" letter-spacing="1">OFW</text>

  <!-- ── BRAND NAME (typography rhyme — mirrors hero name in header) ────── -->
  <text x="871" y="69" text-anchor="end"
        font-family="'Courier New', Consolas, monospace"
        font-size="12" font-weight="800"
        fill="#1a1a1a" letter-spacing="0.5">Muhammad Irfan</text>

  <!-- ── LEFT ACCENT STRIP (visual rhyme anchor — on every card) ──────── -->
  <rect x="0" y="0" width="3" height="92" fill="#7c3aed" opacity="0.7"/>

  <!-- Card border -->
  <rect x="899" y="0" width="1" height="92" fill="#e5e1d8"/>
  <rect y="0" width="900" height="1" fill="#e5e1d8"/>
  <rect y="91" width="900" height="1" fill="#e5e1d8"/>

</g>
</svg>