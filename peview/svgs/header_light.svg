<svg xmlns="http://www.w3.org/2000/svg" width="900" height="156" viewBox="0 0 900 156">
<defs>
  <clipPath id="hc"><rect width="900" height="156" rx="8"/></clipPath>
  <!-- Gradient on title bar: solid left → fades to bg right (depth) -->
  <linearGradient id="hBarGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#f5f2eb"/>
    <stop offset="100%" stop-color="#fcfbf9"/>
  </linearGradient>
</defs>
<g clip-path="url(#hc)">

  <!-- Base background -->
  <rect width="900" height="156" fill="#fcfbf9"/>

  <!-- ── TITLE BAR ──────────────────────────────────────────────────────── -->
  <rect width="900" height="32" fill="url(#hBarGrad)"/>
  <rect y="31.5" width="900" height="0.5" fill="#e5e1d8" opacity="0.6"/>

  <!-- Mac traffic-light dots (visual rhyme: also in footer) -->
  <circle cx="22" cy="16" r="4.5" fill="#ff5f57"/>
  <circle cx="38" cy="16" r="4.5" fill="#febc2e"/>
  <circle cx="54" cy="16" r="4.5" fill="#28c840"/>
  <text x="74" y="20.5"
        font-family="'Courier New', Consolas, monospace"
        font-size="11" font-weight="600"
        fill="#8c959f" letter-spacing="0.5">~/lowdevco — zsh</text>

  <!-- ── HERO NAME (star typography moment) ────────────────────────────── -->
  <text x="28" y="80"
        font-family="'Courier New', Consolas, monospace"
        font-size="34" font-weight="900"
        fill="#1a1a1a" letter-spacing="-0.5">Muhammad Irfan</text>

  <!-- Accent underline under name (depth: makes name feel grounded) -->
  <rect x="28" y="85" width="220" height="2" rx="1"
        fill="#16a34a" opacity="0.35"/>

  <!-- ── ROLE LINE ──────────────────────────────────────────────────────── -->
  <text x="28" y="104"
        font-family="'Courier New', Consolas, monospace"
        font-size="11" fill="#57606a" letter-spacing="0.5">Full Stack Developer  ·  Python &amp; React  ·  Kerala, India  ·  UTC+5:30</text>

  <!-- ── OPEN FOR WORK BADGE ───────────────────────────────────────────── -->
  <rect x="28" y="116" width="122" height="18" rx="9" fill="#dcfce7"/>
  <!-- Dot bullet (visual rhyme: same motif in footer link pills + profile bullets) -->
  <circle cx="41" cy="125" r="3.5" fill="#16a34a"/>
  <text x="53" y="128.5"
        font-family="'Courier New', Consolas, monospace"
        font-size="9.5" font-weight="700"
        fill="#16a34a" letter-spacing="0.5">OPEN FOR WORK</text>

  <!-- ── LEFT ACCENT STRIP (visual rhyme anchor — on every card) ────────── -->
  <rect x="0" y="0" width="3" height="156" fill="#16a34a" opacity="0.7"/>

  <!-- Card border -->
  <rect y="0" width="900" height="1" fill="#e5e1d8"/>
  <rect x="899" y="0" width="1" height="156" fill="#e5e1d8"/>
  <rect y="155" width="900" height="1" fill="#e5e1d8"/>

</g>
</svg>