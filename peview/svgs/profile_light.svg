<svg xmlns="http://www.w3.org/2000/svg" width="900" height="418" viewBox="0 0 900 418">
<defs>
  <clipPath id="pc"><rect width="900" height="418"/></clipPath>
  <!-- Number glow filter (depth — only applied in dark mode) -->
  <filter id="numGlow" x="-40%" y="-60%" width="180%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <!-- Column divider gradient: solid top → transparent bottom (depth) -->
  <linearGradient id="divGrad" x1="0" y1="0" x2="0" y2="1"
                   gradientUnits="userSpaceOnUse"
                   y1="24" y2="294">
    <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </linearGradient>
</defs>
<g clip-path="url(#pc)">

  <rect width="900" height="418" fill="#fcfbf9"/>
  <rect width="900" height="0.5" fill="#e5e1d8"/>

  <!-- ── LEFT: ABOUT ──────────────────────────────────────────────────── -->
  <!-- Section label (// prefix — visual rhyme across all cards) -->
  <text x="24" y="16"
        font-family="'Courier New',Consolas,monospace"
        font-size="9" font-weight="700" letter-spacing="2" fill="#8c959f">// ABOUT</text>
  <line x1="24" y1="24" x2="436" y2="24"
        stroke="#e5e1d8" stroke-width="0.5"/>

  <text x="24" y="44"
      font-family="'Courier New',Consolas,monospace"
      font-size="12.5" font-weight="700"
      fill="#1a1a1a">I build robust web systems from the database up —</text>
  <text x="24" y="59"
      font-family="'Courier New',Consolas,monospace"
      font-size="12.5" font-weight="700"
      fill="#1a1a1a">scalability first, clean code always.</text>

  <text x="24" y="89"
      font-family="'Courier New',Consolas,monospace"
      font-size="11" font-weight="400"
      fill="#57606a">Python Full Stack Developer based in Kerala, India,</text>
  <text x="24" y="104"
      font-family="'Courier New',Consolas,monospace"
      font-size="11" font-weight="400"
      fill="#57606a">turning complex requirements into elegant solutions.</text>
  <text x="24" y="119"
      font-family="'Courier New',Consolas,monospace"
      font-size="11" font-weight="400"
      fill="#57606a">Specialized in crafting reliable backends using</text>
  <text x="24" y="134"
      font-family="'Courier New',Consolas,monospace"
      font-size="11" font-weight="400"
      fill="#57606a">Django and building dynamic frontends with React.</text>

  <text x="24" y="164"
      font-family="'Courier New',Consolas,monospace"
      font-size="11" font-weight="400"
      fill="#57606a">Focused on clean REST APIs, optimized SQL databases,</text>
  <text x="24" y="179"
      font-family="'Courier New',Consolas,monospace"
      font-size="11" font-weight="400"
      fill="#57606a">responsive Tailwind CSS designs, and writing clean,</text>
  <text x="24" y="194"
      font-family="'Courier New',Consolas,monospace"
      font-size="11" font-weight="400"
      fill="#57606a">maintainable code with a strong attention to detail.</text>

  <!-- Divider + bullet list below about text -->
  <line x1="24" y1="262" x2="436" y2="262"
        stroke="#d4cdbc" stroke-width="0.5"/>

  <!-- Dot bullet (visual rhyme — same dot used in badge, footer links, legend) -->
  <circle cx="29" cy="269" r="2.5" fill="#7c3aed" opacity="0.75"/>
  <text x="40" y="274"
        font-family="'Courier New',Consolas,monospace" font-size="11" fill="#8c959f">Django · REST APIs · SQL Databases</text>

  <circle cx="29" cy="285" r="2.5" fill="#7c3aed" opacity="0.75"/>
  <text x="40" y="290"
        font-family="'Courier New',Consolas,monospace" font-size="11" fill="#8c959f">React · Tailwind CSS · JavaScript · Git</text>

  <!-- ── COLUMN DIVIDER (gradient fade — depth) ───────────────────────── -->
  <rect x="456" y="24" width="1" height="270"
        fill="url(#divGrad)"/>

  <!-- ── RIGHT: GITHUB STATS ───────────────────────────────────────────── -->
  <!-- Tinted card background (depth layer — elevation panel) -->
  <rect x="456" y="0" width="444" height="306"
        fill="#f5f2eb" opacity="0.5"/>

  <!-- Section label -->
  <text x="480" y="16"
        font-family="'Courier New',Consolas,monospace"
        font-size="9" font-weight="700" letter-spacing="2" fill="#8c959f">// GITHUB STATS</text>
  <line x1="480" y1="24" x2="876" y2="24"
        stroke="#e5e1d8" stroke-width="0.5"/>

  
  <!-- stat row 0 -->
  <text x="480" y="52"
        font-family="'Courier New',Consolas,monospace"
        font-size="10" fill="#7c3aed">↑</text>
  <text x="496" y="52"
        font-family="'Courier New',Consolas,monospace"
        font-size="10" fill="#57606a">Commits (2026)</text>
  <!-- Stat value with optional glow (depth — makes numbers feel luminous in dark) -->
  
  <text x="876" y="52" text-anchor="end"
        font-family="'Courier New',Consolas,monospace"
        font-size="20" font-weight="700" fill="#7c3aed">125</text>
  <!-- stat row 1 -->
  <text x="480" y="98"
        font-family="'Courier New',Consolas,monospace"
        font-size="10" fill="#7c3aed">⇄</text>
  <text x="496" y="98"
        font-family="'Courier New',Consolas,monospace"
        font-size="10" fill="#57606a">Pull Requests</text>
  <!-- Stat value with optional glow (depth — makes numbers feel luminous in dark) -->
  
  <text x="876" y="98" text-anchor="end"
        font-family="'Courier New',Consolas,monospace"
        font-size="20" font-weight="700" fill="#7c3aed">2</text>
  <!-- stat row 2 -->
  <text x="480" y="144"
        font-family="'Courier New',Consolas,monospace"
        font-size="10" fill="#7c3aed">!</text>
  <text x="496" y="144"
        font-family="'Courier New',Consolas,monospace"
        font-size="10" fill="#57606a">Issues</text>
  <!-- Stat value with optional glow (depth — makes numbers feel luminous in dark) -->
  
  <text x="876" y="144" text-anchor="end"
        font-family="'Courier New',Consolas,monospace"
        font-size="20" font-weight="700" fill="#7c3aed">0</text>
  
  <rect x="690" y="186" width="88" height="20" rx="10"
        fill="#dcfce7" stroke="#e5e1d8" stroke-width="0.5"/>
  <text x="734" y="199" text-anchor="middle"
        font-family="'Courier New',Consolas,monospace"
        font-size="9.5" font-weight="700" fill="#7c3aed">Full Stack</text>
  <rect x="788" y="186" width="88" height="20" rx="10"
        fill="#f3e8ff" stroke="#e5e1d8" stroke-width="0.5"/>
  <text x="832" y="199" text-anchor="middle"
        font-family="'Courier New',Consolas,monospace"
        font-size="9.5" font-weight="700" fill="#7e22ce">IST · IN</text>

  <!-- ── FULL-WIDTH SEPARATOR + LANGUAGES ──────────────────────────────── -->
  <line x1="24" y1="306" x2="876" y2="306"
        stroke="#e5e1d8" stroke-width="0.5"/>
  <text x="24" y="320"
        font-family="'Courier New',Consolas,monospace"
        font-size="9" font-weight="700" letter-spacing="2" fill="#8c959f">// TOP LANGUAGES</text>

  
  <text x="160" y="338" text-anchor="end"
        font-family="'Courier New',Consolas,monospace" font-size="11" fill="#57606a">Python</text>
  <!-- Track -->
  <rect x="170" y="328" width="674" height="8" rx="4" fill="#d4cdbc"/>
  <!-- Fill -->
  <rect x="170" y="328" width="370" height="8" rx="4" fill="#3572a5"/>
  <!-- Sheen (depth — same treatment as skill bars) -->
  <rect x="170" y="328" width="370" height="3.5" rx="1.5" fill="white" opacity="0.30"/>
  <text x="852" y="338" text-anchor="end"
        font-family="'Courier New',Consolas,monospace" font-size="10" fill="#8c959f">55%</text>
  <text x="160" y="368" text-anchor="end"
        font-family="'Courier New',Consolas,monospace" font-size="11" fill="#57606a">JavaScript</text>
  <!-- Track -->
  <rect x="170" y="358" width="674" height="8" rx="4" fill="#d4cdbc"/>
  <!-- Fill -->
  <rect x="170" y="358" width="168" height="8" rx="4" fill="#f1e05a"/>
  <!-- Sheen (depth — same treatment as skill bars) -->
  <rect x="170" y="358" width="168" height="3.5" rx="1.5" fill="white" opacity="0.30"/>
  <text x="852" y="368" text-anchor="end"
        font-family="'Courier New',Consolas,monospace" font-size="10" fill="#8c959f">25%</text>

  <!-- ── LEFT ACCENT STRIP (visual rhyme anchor — on every card) ────────── -->
  <rect x="0" y="0" width="3" height="418" fill="#7c3aed" opacity="0.7"/>

  <rect y="417" width="900" height="1" fill="#e5e1d8"/>
</g>
</svg>